<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تست</title>
</head>
<body style="font-family:Cairo,sans-serif;text-align:center;padding:40px;">
<h2>✅ الموقع شغال</h2>
<button onclick="document.getElementById('modal').style.display='block'" style="padding:14px 28px;font-size:16px;border-radius:12px;border:none;background:#E8A4B0;color:white;cursor:pointer;">
  افتح اللوحة
</button>
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;">
  <div style="background:white;padding:30px;border-radius:20px;">
    <p>✅ اللوحة اشتغلت</p>
    <button onclick="document.getElementById('modal').style.display='none'">إغلاق</button>
  </div>
</div>
</body>
</html>
