<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كراكيب - رفايع البيت والمطبخ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--rose:#E8A4B0;--rose-dark:#C97B8B;--rose-light:#FAF0F2;--gold:#C9A84C;--gold-light:#FFF8E1;--text:#3D2B2F;--text-light:#8A6A70;--bg:#FDF7F8;--shadow:rgba(201,123,139,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);}
.header{background:linear-gradient(135deg,#E8A4B0,#C97B8B,#B5667A);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(201,123,139,.3);}
.header-inner{max-width:900px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:44px;height:44px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text h1{color:white;font-size:17px;font-weight:900;}
.logo-text p{color:rgba(255,255,255,.85);font-size:11px;}
.header-btns{display:flex;gap:7px;}
.hbtn{background:white;border:none;border-radius:50px;padding:8px 14px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;color:var(--rose-dark);cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.hbtn.icon-only{padding:8px;width:38px;height:38px;border-radius:50%;justify-content:center;font-size:16px;}
.cart-count{background:var(--gold);color:white;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:900;}
.hero{background:linear-gradient(180deg,#FAE8EC,var(--bg));padding:28px 20px 20px;text-align:center;border-bottom:1px solid #F0D8DD;}
.hero h2{font-size:24px;font-weight:900;color:var(--rose-dark);margin-bottom:5px;}
.hero p{font-size:14px;color:var(--text-light);}
.search-wrap{max-width:900px;margin:16px auto 0;padding:0 16px;}
.search-box{position:relative;}
.search-box input{width:100%;padding:13px 16px 13px 44px;border:2px solid #F0D8DD;border-radius:50px;font-family:'Cairo',sans-serif;font-size:15px;color:var(--text);background:white;outline:none;}
.search-box input:focus{border-color:var(--rose);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:17px;}
.price-filter{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pf-btn{background:white;border:2px solid #F0D8DD;border-radius:50px;padding:5px 12px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:var(--text-light);cursor:pointer;}
.pf-btn.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold);}
.cats{max-width:900px;margin:12px auto 0;padding:0 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{background:white;border:2px solid #F0D8DD;border-radius:50px;padding:6px 14px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--text-light);cursor:pointer;white-space:nowrap;}
.cat-btn.active{background:var(--rose);border-color:var(--rose);color:white;}
.products-wrap{max-width:900px;margin:20px auto;padding:0 16px;}
.section-label{font-size:14px;font-weight:700;color:var(--text-light);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:#F0D8DD;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skeleton{background:linear-gradient(90deg,#F5E8EA 25%,#FAF0F2 50%,#F5E8EA 75%);background-size:600px 100%;animation:shimmer 1.4s infinite linear;border-radius:10px;}
.skel-card{background:white;border-radius:16px;overflow:hidden;border:1px solid #F5E8EA;}
.skel-img{width:100%;aspect-ratio:1;}
.skel-line{height:13px;margin:10px 12px 6px;}
.skel-line.short{width:60%;height:11px;margin:0 12px 12px;}
.card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);border:1px solid #F5E8EA;cursor:pointer;transition:transform .2s;}
.card:hover{transform:translateY(-3px);}
.card-img{width:100%;aspect-ratio:1;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.out-badge{position:absolute;top:8px;right:8px;background:rgba(61,43,47,.75);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;}
.stock-badge{position:absolute;top:8px;left:8px;background:rgba(201,168,76,.9);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;}
.card-info{padding:10px 12px 12px;}
.card-name{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-cat{font-size:11px;color:var(--text-light);margin-bottom:6px;}
.card-stars{font-size:12px;color:var(--gold);margin-bottom:6px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-size:15px;font-weight:900;color:var(--rose-dark);}
.card-price span{font-size:10px;color:var(--text-light);font-weight:600;}
.old-price{font-size:11px;color:#AAA;text-decoration:line-through;font-weight:600;}
.discount-badge{background:#FF4757;color:white;font-size:10px;font-weight:900;padding:2px 6px;border-radius:50px;}
.add-btn{background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:50%;width:32px;height:32px;font-size:18px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(201,123,139,.4);}
.add-btn:disabled{background:#DDD;box-shadow:none;cursor:not-allowed;}
.empty{text-align:center;padding:60px 20px;color:var(--text-light);}
.float-wa{position:fixed;bottom:24px;left:20px;z-index:150;background:linear-gradient(135deg,#25D366,#128C7E);border:none;border-radius:50px;padding:12px 18px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:white;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(37,211,102,.45);}
.overlay{position:fixed;inset:0;background:rgba(61,43,47,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:28px 28px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding:24px 20px;}
.overlay.open .modal{transform:translateY(0);}
.modal-handle{width:38px;height:4px;background:#E5D0D3;border-radius:2px;margin:0 auto 18px;}
.mclose{background:var(--rose-light);border:none;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;float:left;display:flex;align-items:center;justify-content:center;color:var(--text-light);}
.cf::after{content:'';display:block;clear:both;}
.pm-img{width:100%;aspect-ratio:16/9;background:var(--rose-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:72px;margin-bottom:16px;overflow:hidden;position:relative;}
.pm-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.pm-imgs-row{display:flex;gap:6px;margin-top:8px;}
.pm-img-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;border:2px solid transparent;}
.pm-img-thumb.active{border-color:var(--rose-dark);}
.qty-ctrl{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px;background:var(--rose-light);border-radius:50px;padding:9px 20px;}
.qty-btn{background:white;border:2px solid var(--rose);border-radius:50%;width:36px;height:36px;font-size:18px;color:var(--rose-dark);cursor:pointer;font-weight:900;font-family:'Cairo',sans-serif;}
.qty-num{font-size:20px;font-weight:900;min-width:28px;text-align:center;}
.cart-add-btn{width:100%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:14px;padding:14px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 14px rgba(201,123,139,.4);}
.cart-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #F5E8EA;}
.ci-img{font-size:28px;width:46px;height:46px;background:var(--rose-light);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.ci-img img{width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;}
.ci-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.ci-detail{font-size:11px;color:var(--text-light);}
.ci-qty{display:flex;align-items:center;gap:6px;}
.qi-btn{background:#F5E8EA;border:none;border-radius:50%;width:24px;height:24px;font-size:15px;font-weight:900;color:var(--rose-dark);cursor:pointer;font-family:'Cairo',sans-serif;}
.qi-num{font-size:13px;font-weight:700;min-width:18px;text-align:center;}
.ci-del{background:none;border:none;font-size:17px;cursor:pointer;padding:3px;}
.cart-total-box{background:var(--gold-light);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin:16px 0 12px;}
.ct-amount{font-size:20px;font-weight:900;color:var(--gold);}
.wa-btn{width:100%;background:linear-gradient(135deg,#25D366,#128C7E);border:none;border-radius:14px;padding:14px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.rate-stars{display:flex;gap:4px;direction:ltr;justify-content:center;margin:10px 0;}
.star-pick{font-size:28px;cursor:pointer;color:#DDD;}
.star-pick.lit{color:var(--gold);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border:2px solid #F0D8DD;border-radius:11px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--text);background:white;outline:none;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--rose);}
.save-btn{width:100%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:13px;padding:13px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:white;cursor:pointer;margin-top:4px;}
.admin-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.atab{flex-shrink:0;background:var(--rose-light);border:none;border-radius:12px;padding:9px 14px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--text-light);cursor:pointer;white-space:nowrap;}
.atab.active{background:var(--rose);color:white;}
.admin-pi{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #F5E8EA;}
.api-img{font-size:26px;width:42px;height:42px;background:var(--rose-light);border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.api-img img{width:100%;height:100%;object-fit:cover;}
.api-info{flex:1;}
.api-info strong{font-size:13px;display:block;margin-bottom:2px;}
.api-info span{font-size:11px;color:var(--text-light);}
.img-zone{border:2px dashed #F0D8DD;border-radius:11px;padding:16px;text-align:center;cursor:pointer;margin-bottom:6px;}
.img-zone p{font-size:12px;color:var(--text-light);margin-top:5px;}
.img-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.img-thumb-wrap{position:relative;}
.img-thumb-wrap img{width:60px;height:60px;border-radius:8px;object-fit:cover;}
.img-rm{position:absolute;top:-4px;right:-4px;background:var(--rose-dark);color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;}
.pw-screen{text-align:center;padding:16px 0;}
.pw-screen .lock{font-size:52px;margin-bottom:14px;}
.pw-screen h3{font-size:17px;font-weight:900;margin-bottom:5px;}
.pw-screen p{font-size:12px;color:var(--text-light);margin-bottom:18px;}
.pw-input{width:100%;padding:13px;border:2px solid #F0D8DD;border-radius:13px;font-family:'Cairo',sans-serif;font-size:16px;text-align:center;letter-spacing:3px;outline:none;margin-bottom:12px;}
.pw-input:focus{border-color:var(--rose);}
.pw-err{color:#D9534F;font-size:12px;margin-top:6px;display:none;}
.promo-banner{border-radius:18px;padding:22px;text-align:center;margin-bottom:18px;}
.promo-banner h2{color:white;font-size:20px;font-weight:900;margin-bottom:8px;}
.promo-banner p{color:rgba(255,255,255,.92);font-size:13px;line-height:1.6;}
.promo-btns{display:flex;gap:8px;}
.promo-buy{flex:1;background:linear-gradient(135deg,var(--rose),var(--rose-dark));border:none;border-radius:13px;padding:13px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:white;cursor:pointer;}
.promo-skip{background:#F5E8EA;border:none;border-radius:13px;padding:13px 16px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--rose-light);border-radius:14px;padding:14px;text-align:center;}
.stat-card.gold{background:var(--gold-light);}.stat-card.gold .stat-num{color:var(--gold);}
.stat-card.green{background:#E8F8F0;}.stat-card.green .stat-num{color:#1E8449;}
.stat-card.red{background:#FDEDEC;}.stat-card.red .stat-num{color:#C0392B;}
.stat-num{font-size:24px;font-weight:900;color:var(--rose-dark);}
.stat-label{font-size:11px;color:var(--text-light);margin-top:2px;}
.order-item{padding:12px;background:#FFF;border-radius:12px;margin-bottom:8px;border:1px solid #F0D8DD;font-size:12px;}
.order-status-pending{background:#FFF3CD;color:#7A6020;font-size:11px;padding:3px 8px;border-radius:50px
